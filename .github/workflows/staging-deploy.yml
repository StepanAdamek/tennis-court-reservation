name: Staging Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-staging:
    runs-on: self-hosted

    env:
      IMAGE_NAME: ghcr.io/stepanadamek/tennis-court-reservation
      IMAGE_TAG: staging-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        shell: powershell
        run: docker build -t "$env:IMAGE_NAME`:$env:IMAGE_TAG" .

      - name: Push Docker image
        shell: powershell
        run: docker push "$env:IMAGE_NAME`:$env:IMAGE_TAG"

      - name: Verify kubectl access
        shell: powershell
        run: kubectl get nodes

      - name: Apply staging manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/staging/namespace.yaml
          kubectl apply -f k8s/staging/configmap.yaml
          kubectl apply -f k8s/staging/secret.yaml
          kubectl apply -f k8s/staging/postgres-deployment.yaml
          kubectl apply -f k8s/staging/postgres-service.yaml
          kubectl apply -f k8s/staging/app-service.yaml
          kubectl apply -f k8s/staging/app-deployment.yaml

      - name: Update image in staging deployment
        shell: powershell
        run: kubectl set image deployment/tennis-app-deployment tennis-app="$env:IMAGE_NAME`:$env:IMAGE_TAG" -n tennis-staging

      - name: Wait for rollout
        shell: powershell
        run: kubectl rollout status deployment/tennis-app-deployment -n tennis-staging --timeout=300s